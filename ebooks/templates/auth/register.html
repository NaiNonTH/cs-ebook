{% extends "../base.html" %}

{% block title %}Register{% endblock title %}

{% block content %}
	<header class="page-header">
		<h1>Register</h1>
		<p>Sign up to start your E-Book journey!</p>
	</header>
	<p>Already have account? <a href="{% url 'login' %}">Login</a></p>
	<form method="post">
		{% csrf_token %}
		{{ form.as_p }}
		<button type="submit" class="btn-primary">สมัครสมาชิก</button>
	</form>
{% endblock content %}
