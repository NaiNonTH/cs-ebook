{% extends "base.html" %}
{% load static %}

{% block title %}{{ ebook.title }}{% endblock %}

{% block css %}
<link rel="stylesheet" href="{% static 'ebooks/read_ebook.css' %}">
{% endblock %}

{% block content %}
<h2>{{ ebook.title }}</h2>

<div class="reader-container">

    <div class="image-wrapper">
        <img src="{{ current_image }}" class="ebook-page">
    </div>

    <div class="controls">
        {% if page > 1 %}
            <a href="?page={{ page|add:'-1' }}" class="btn">Previous</a>
        {% endif %}

        <span class="page-indicator">
            Page {{ page }} / {{ total_pages }}
        </span>

        {% if page < total_pages %}
            <a href="?page={{ page|add:'1' }}" class="btn">Next</a>
        {% endif %}
    </div>

    <form method="get" class="jump-form">
        <input 
            type="number" 
            name="page" 
            min="1" 
            max="{{ total_pages }}" 
            value="{{ page }}"
        >
        <button type="submit">Go</button>
    </form>

</div>
{% endblock %}
